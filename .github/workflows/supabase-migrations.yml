# SUPABASE_DATABASE_URL secret must be set in Settings > Secrets > Actions.
# Format: postgresql://postgres.[PROJECT_REF]:[PASSWORD]@aws-0-REGION.pooler.supabase.com:5432/postgres
# Use Session pooler URL from Supabase Dashboard > Settings > Database. Encode @ in password as %40.
name: Push Supabase Migrations
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    # Allow Deploy to succeed; migrations may need manual fix (see DEPLOY_CYCLE.md)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check SUPABASE_DATABASE_URL is configured
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DATABASE_URL" ]; then
            echo "::error::SUPABASE_DATABASE_URL secret is not set. Add it in repo Settings > Secrets and variables > Actions. Format: postgresql://postgres.[PROJECT_REF]:[PASSWORD]@HOST.pooler.supabase.com:5432/postgres"
            exit 1
          fi
          if [[ "$SUPABASE_DATABASE_URL" != postgres* ]]; then
            echo "::error::SUPABASE_DATABASE_URL must start with postgresql:// or postgres://"
            exit 1
          fi

      - name: Repair legacy migration 001 (one-time cleanup if duplicate-key occurred)
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: supabase migration repair 001 --status reverted --db-url "$SUPABASE_DATABASE_URL" || true
        continue-on-error: true

      - name: Push migrations
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: supabase db push --db-url "$SUPABASE_DATABASE_URL" --yes --debug
