name: Push Supabase Migrations
on:
  push:
    branches: [main]
    paths: ['supabase/migrations/**', 'supabase/config.toml', '.github/workflows/supabase-migrations.yml']
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          ENCODED_PASS=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ.get('SUPABASE_DB_PASSWORD',''), safe=''))")
          DB_URL="postgresql://postgres:${ENCODED_PASS}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
          supabase db push --db-url "$DB_URL"
