# Database URL secrets (Settings > Secrets > Actions) — at least one required:
#   SUPABASE_DB_URL_DIRECT          — db.<ref>.supabase.co:5432 (avoids session pool limits; needs IPv6 or IPv4 add-on from runner)
#   SUPABASE_DB_URL_SESSION_POOLER  — *.pooler.supabase.com:5432 (limited pool_size; easy to hit MaxClientsInSessionMode if many clients connect)
#   SUPABASE_DATABASE_URL           — legacy fallback
# Encode @ in password as %40.
#
# If pooler errors persist: pause other tools using the DB (Dashboard SQL, local apps), upgrade pool size, or use Direct + IPv4 add-on for CI.
name: Push Supabase Migrations
on:
  push:
    branches: [main]
  workflow_dispatch:

# One migration push at a time — parallel runs exhaust session pooler slots (MaxClientsInSessionMode).
concurrency:
  group: supabase-migrations-${{ github.repository }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    # Allow Deploy to succeed; migrations may need manual fix (see DEPLOY_CYCLE.md)
    continue-on-error: true
    env:
      SB_DIRECT: ${{ secrets.SUPABASE_DB_URL_DIRECT }}
      SB_POOLER: ${{ secrets.SUPABASE_DB_URL_SESSION_POOLER }}
      SB_LEGACY: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check database URL secrets
        run: |
          first=""
          [ -n "$SB_DIRECT" ] && first="$SB_DIRECT"
          [ -z "$first" ] && [ -n "$SB_POOLER" ] && first="$SB_POOLER"
          [ -z "$first" ] && [ -n "$SB_LEGACY" ] && first="$SB_LEGACY"
          if [ -z "$first" ]; then
            echo "::error::Set at least one of SUPABASE_DB_URL_DIRECT, SUPABASE_DB_URL_SESSION_POOLER, or SUPABASE_DATABASE_URL"
            exit 1
          fi
          if [[ "$first" != postgres* ]]; then
            echo "::error::Database URL must start with postgresql:// or postgres://"
            exit 1
          fi
          if echo "$first" | grep -q 'pooler.supabase.com'; then
            echo "::warning::First-resolved URL uses session pooler. Prefer SUPABASE_DB_URL_DIRECT for CI when reachable — pooler has strict session limits."
          fi

      - name: Repair legacy migration 001 (one-time cleanup if duplicate-key occurred)
        env:
          PGOPTIONS: "-c statement_timeout=600s -c lock_timeout=120s"
        run: |
          # Prefer direct for repair (one short connection; avoids burning a pooler slot when direct works)
          first=""
          [ -n "$SB_DIRECT" ] && first="$SB_DIRECT"
          [ -z "$first" ] && [ -n "$SB_POOLER" ] && first="$SB_POOLER"
          [ -z "$first" ] && [ -n "$SB_LEGACY" ] && first="$SB_LEGACY"
          supabase migration repair 001 --status reverted --db-url "$first" || true
        continue-on-error: true

      - name: Push migrations
        env:
          PGOPTIONS: "-c statement_timeout=600s -c lock_timeout=120s"
        run: |
          set -e
          is_pooler_url() { echo "$1" | grep -q 'pooler.supabase.com'; }

          urls=()
          add_url() {
            local u="$1"
            [ -z "$u" ] && return 0
            local x
            for x in "${urls[@]}"; do
              [ "$x" = "$u" ] && return 0
            done
            urls+=("$u")
          }
          add_url "$SB_DIRECT"
          add_url "$SB_POOLER"
          add_url "$SB_LEGACY"
          if [ ${#urls[@]} -eq 0 ]; then
            echo "::error::No database URL secrets configured"
            exit 1
          fi

          overall_ok=0
          tried_non_pooler=0
          for url in "${urls[@]}"; do
            if is_pooler_url "$url"; then
              echo "::notice::db push: session pooler URL"
              if [ "$tried_non_pooler" -eq 1 ]; then
                echo "::notice::120s cooldown before pooler (lets pool_size / circuit breaker recover)"
                sleep 120
              fi
              max_attempts=2
              sleep_between=150
            else
              echo "::notice::db push: direct / non-pooler URL"
              max_attempts=3
              sleep_between=90
            fi

            ok=0
            i=1
            while [ "$i" -le "$max_attempts" ]; do
              echo "::group::db push attempt $i/$max_attempts (this URL)"
              if supabase db push --db-url "$url" --yes --debug; then
                ok=1
                echo "::endgroup::"
                break
              fi
              echo "::endgroup::"
              if [ "$i" -lt "$max_attempts" ]; then
                echo "Retry in ${sleep_between}s (pooler: avoid MaxClientsInSessionMode / circuit breaker)..."
                sleep "$sleep_between"
              fi
              i=$((i + 1))
            done

            if [ "$ok" -eq 1 ]; then
              overall_ok=1
              break
            fi
            echo "::warning::All retries failed for this URL; trying next secret if configured..."
            if ! is_pooler_url "$url"; then
              tried_non_pooler=1
            fi
          done
          if [ "$overall_ok" -eq 1 ]; then
            exit 0
          fi

          echo "::warning::supabase db push failed for all URLs. Attempting psql fallback for missing migrations."
          if ! command -v psql >/dev/null 2>&1; then
            echo "::notice::Installing postgresql-client for fallback..."
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

          select_reachable_url() {
            local u="$1"
            [ -z "$u" ] && return 1
            local j=1
            while [ "$j" -le 3 ]; do
              if psql "$u" -v ON_ERROR_STOP=1 -Atqc "select 1" >/dev/null 2>&1; then
                return 0
              fi
              sleep 20
              j=$((j + 1))
            done
            return 1
          }

          fallback_url=""
          for url in "${urls[@]}"; do
            if select_reachable_url "$url"; then
              fallback_url="$url"
              break
            fi
          done

          if [ -z "$fallback_url" ]; then
            echo "::error::No reachable database URL for psql fallback."
            exit 1
          fi

          psql "$fallback_url" -v ON_ERROR_STOP=1 -c "CREATE SCHEMA IF NOT EXISTS supabase_migrations;"
          psql "$fallback_url" -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (version text PRIMARY KEY, name text, statements text[]);"
          psql "$fallback_url" -Atqc "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version;" > /tmp/remote_versions.txt

          for file in $(printf '%s\n' supabase/migrations/*.sql | sort); do
            base=$(basename "$file")
            version="${base%%_*}"
            name="${base#*_}"
            name="${name%.sql}"
            if grep -qxF "$version" /tmp/remote_versions.txt; then
              continue
            fi
            echo "::notice::psql fallback applying $base"
            psql "$fallback_url" -v ON_ERROR_STOP=1 -f "$file"
            psql "$fallback_url" -v ON_ERROR_STOP=1 -c "INSERT INTO supabase_migrations.schema_migrations(version, name) VALUES ('$version', '$name') ON CONFLICT (version) DO NOTHING;"
          done

          echo "::notice::psql fallback completed."
