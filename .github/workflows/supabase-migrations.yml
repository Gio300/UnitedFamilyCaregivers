# Database URL secrets (Settings > Secrets > Actions) — at least one required:
#   SUPABASE_DB_URL_DIRECT          — db.<ref>.supabase.co:5432 (best for long DDL; needs IPv6 or IPv4 add-on from runner)
#   SUPABASE_DB_URL_SESSION_POOLER  — *.pooler.supabase.com:5432 (IPv4-friendly; may reset on very long runs)
#   SUPABASE_DATABASE_URL           — legacy fallback if the above are unset
# Encode @ in password as %40.
name: Push Supabase Migrations
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    # Allow Deploy to succeed; migrations may need manual fix (see DEPLOY_CYCLE.md)
    continue-on-error: true
    env:
      SB_DIRECT: ${{ secrets.SUPABASE_DB_URL_DIRECT }}
      SB_POOLER: ${{ secrets.SUPABASE_DB_URL_SESSION_POOLER }}
      SB_LEGACY: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check database URL secrets
        run: |
          first=""
          [ -n "$SB_DIRECT" ] && first="$SB_DIRECT"
          [ -z "$first" ] && [ -n "$SB_POOLER" ] && first="$SB_POOLER"
          [ -z "$first" ] && [ -n "$SB_LEGACY" ] && first="$SB_LEGACY"
          if [ -z "$first" ]; then
            echo "::error::Set at least one of SUPABASE_DB_URL_DIRECT, SUPABASE_DB_URL_SESSION_POOLER, or SUPABASE_DATABASE_URL"
            exit 1
          fi
          if [[ "$first" != postgres* ]]; then
            echo "::error::Database URL must start with postgresql:// or postgres://"
            exit 1
          fi
          if echo "$first" | grep -q 'pooler.supabase.com'; then
            echo "::warning::First-resolved URL uses pooler. Prefer SUPABASE_DB_URL_DIRECT for long migrations when your runner can reach it (IPv6 / IPv4 add-on)."
          fi

      - name: Repair legacy migration 001 (one-time cleanup if duplicate-key occurred)
        env:
          PGOPTIONS: "-c statement_timeout=600s -c lock_timeout=120s"
        run: |
          first=""
          [ -n "$SB_DIRECT" ] && first="$SB_DIRECT"
          [ -z "$first" ] && [ -n "$SB_POOLER" ] && first="$SB_POOLER"
          [ -z "$first" ] && [ -n "$SB_LEGACY" ] && first="$SB_LEGACY"
          supabase migration repair 001 --status reverted --db-url "$first" || true
        continue-on-error: true

      - name: Push migrations
        env:
          PGOPTIONS: "-c statement_timeout=600s -c lock_timeout=120s"
        run: |
          set -e
          urls=()
          add_url() {
            local u="$1"
            [ -z "$u" ] && return 0
            local x
            for x in "${urls[@]}"; do
              [ "$x" = "$u" ] && return 0
            done
            urls+=("$u")
          }
          add_url "$SB_DIRECT"
          add_url "$SB_POOLER"
          add_url "$SB_LEGACY"
          if [ ${#urls[@]} -eq 0 ]; then
            echo "::error::No database URL secrets configured"
            exit 1
          fi

          overall_ok=0
          for url in "${urls[@]}"; do
            if echo "$url" | grep -q 'pooler.supabase.com'; then
              echo "::notice::db push: trying session pooler URL (order: direct → pooler → legacy)"
            else
              echo "::notice::db push: trying direct or non-pooler URL"
            fi
            ok=0
            for i in 1 2 3; do
              echo "::group::db push attempt $i/3 (this URL)"
              if supabase db push --db-url "$url" --yes --debug; then
                ok=1
                echo "::endgroup::"
                break
              fi
              echo "::endgroup::"
              if [ "$i" -lt 3 ]; then
                echo "Retry in 45s (timeouts / connection reset)..."
                sleep 45
              fi
            done
            if [ "$ok" -eq 1 ]; then
              overall_ok=1
              break
            fi
            echo "::warning::All retries failed for this URL; trying next secret if configured..."
          done
          test "$overall_ok" -eq 1
