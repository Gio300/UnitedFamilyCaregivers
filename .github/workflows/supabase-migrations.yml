# Runs on push to supabase/ or this workflow file
name: Push Supabase Migrations
on:
  push:
    branches: [main]
    paths: ['supabase/migrations/**', 'supabase/config.toml', '.github/workflows/supabase-migrations.yml']
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: supabase db push --db-url "$SUPABASE_DATABASE_URL"
