# UnitedFamilyCaregivers - Supabase CLI config
# Used by GitHub Actions for db push (migrations)
# Trigger workflows after adding SUPABASE_DATABASE_URL secret
project_id = "UnitedFamilyCaregivers"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "https://gio300.github.io"
additional_redirect_urls = [
  "https://gio300.github.io/**",
  "http://localhost:3000/**",
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
