# UFC API Stack - AI Gateway + Ollama (Caddy runs in main Kloudy caddy/)
# Run: docker compose up -d
# Requires: docker/.env with Supabase, LiveKit, etc.
# Caddy: Kloudy caddy/Caddyfile includes api.unitedfamilycaregivers.com -> host:7501

services:
  ai-gateway:
    build: ../ai-gateway
    ports:
      - "7501:7501"
    env_file: .env
    environment:
      - PORT=7501
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
