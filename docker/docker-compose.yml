# UFC API Stack - VPS deployment (mirrors KloudyKare serving)
# Run: docker compose up -d
# Requires: docker/.env with Supabase, LiveKit, etc.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - ai-gateway
    restart: unless-stopped

  ai-gateway:
    build: ../ai-gateway
    env_file: .env
    environment:
      - PORT=7501
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  caddy_data:
  ollama_data:
